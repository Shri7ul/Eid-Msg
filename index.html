<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Luxury Cinematic ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
background:#000;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.logo{
font-size:32px;
letter-spacing:6px;
color:#FFD700;
opacity:0;
animation:introAnim 3s ease forwards;
}

@keyframes introAnim{
0%{opacity:0;transform:scale(1.4);filter:blur(10px)}
60%{opacity:1;filter:blur(0)}
100%{letter-spacing:4px}
}

#intro.hide{
animation:fadeOut 1.5s forwards;
}
@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* PHONE */
.phone{
width:100%;
max-width:360px;
height:100vh;
max-height:720px;
border-radius:30px;
overflow:hidden;
position:relative;
background: radial-gradient(circle at top, #111, #000);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:25px;
}

.phone::before{
content:'';
position:absolute;
width:400px;height:400px;
background:#FFD700;
filter:blur(180px);
opacity:.08;
top:-100px;
}

/* PARTICLES */
canvas{
position:absolute;
top:0;
left:0;
}

/* MOON */
.moon{
position:absolute;
top:12%;
right:18%;
width:70px;height:70px;
border-radius:50%;
box-shadow:15px 15px 0 #FFD700;
animation:float 6s infinite ease-in-out;
}
@keyframes float{
50%{transform:translateY(-12px)}
}

/* TEXT */
.title{
font-size:26px;
font-weight:600;
background:linear-gradient(#fff,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
opacity:0;
animation:fadeUp 1s forwards;
}

.line{
font-size:16px;
margin-top:14px;
opacity:0;
letter-spacing:.5px;
animation:fadeUp 1s forwards;
}

.line:nth-child(2){animation-delay:.8s}
.line:nth-child(3){animation-delay:1.4s}
.line:nth-child(4){animation-delay:2s}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1;transform:translateY(0)}
}

/* BUTTON */
.btn{
margin-top:35px;
padding:14px 30px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#FFD700,#caa400);
color:black;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 0 30px rgba(255,215,0,.6);
}

/* VISUALIZER */
.visualizer{
position:absolute;
bottom:25px;
display:flex;
gap:5px;
}
.bar{
width:4px;
height:10px;
background:#FFD700;
border-radius:3px;
}

/* SIGN */
.sign{
position:absolute;
bottom:10px;
right:15px;
font-size:12px;
opacity:.3;
letter-spacing:1px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<div class="logo">NOOR ✨</div>
</div>

<!-- MAIN -->
<div class="phone">

<canvas id="particles"></canvas>

<div class="moon"></div>

<div id="content" style="display:none">

<div class="title">Eid Mubarak 🌙</div>

<div class="line">Not everything needs to be loud</div>
<div class="line">Some feelings stay quiet…</div>
<div class="line">But still mean everything ✨</div>

<button class="btn" onclick="play()">Tap to feel 🎧</button>

</div>

<div class="visualizer" id="bars"></div>

<div class="sign">— crafted by InHuman ⚡</div>

</div>

<audio id="music" loop>
<source src="eid.mp3">
</audio>

<script>

/* INTRO */
setTimeout(()=>{
document.getElementById("intro").classList.add("hide");
document.getElementById("content").style.display="block";
},3200);

/* AUDIO */
let audioCtx, analyser, dataArray;

function play(){
let audio=document.getElementById("music");

if(!audioCtx){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();

let src=audioCtx.createMediaElementSource(audio);
analyser=audioCtx.createAnalyser();

src.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize=64;
dataArray=new Uint8Array(analyser.frequencyBinCount);

initBars();
}

if(audioCtx.state==="suspended") audioCtx.resume();

audio.volume=0;
audio.play();

/* smooth fade in */
let vol=0;
let fade=setInterval(()=>{
if(vol<0.6){
vol+=0.02;
audio.volume=vol;
}else clearInterval(fade);
},100);
}

/* VISUALIZER */
function initBars(){
let container=document.getElementById("bars");

for(let i=0;i<16;i++){
let b=document.createElement("div");
b.className="bar";
container.appendChild(b);
}

let bars=document.querySelectorAll(".bar");

function animate(){
requestAnimationFrame(animate);
analyser.getByteFrequencyData(dataArray);

bars.forEach((bar,i)=>{
bar.style.height=(dataArray[i]/2)+"px";
});
}
animate();
}

/* PARTICLES */
let canvas=document.getElementById("particles");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2,
d:Math.random()*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,215,0,0.2)";

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.y+=p.d;
if(p.y>canvas.height) p.y=0;
});

requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
