<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Drop ⚡</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
background:#000;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* PHONE */
.phone{
width:360px;
height:720px;
border-radius:40px;
overflow:hidden;
position:relative;
background:#000;
box-shadow:0 0 60px rgba(255,215,0,.3);
}

/* SCREEN */
.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
transition:1s cubic-bezier(0.77,0,0.175,1);
}

.glow{
font-size:20px;
line-height:1.4;
background:linear-gradient(90deg,#fff,#FFD700,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#FFD700,#ff9800);
font-weight:bold;
cursor:pointer;
}

/* AUDIO BARS */
.visualizer{
position:absolute;
bottom:20px;
display:flex;
gap:5px;
}
.bar{
width:5px;
height:10px;
background:#FFD700;
border-radius:5px;
}

/* MOON */
.moon{
position:absolute;
top:10%;
right:20%;
width:80px;height:80px;
border-radius:50%;
box-shadow:20px 20px 0 #FFD700;
animation:float 5s infinite ease-in-out;
}
@keyframes float{
50%{transform:translateY(-15px)}
}

/* PARTICLES */
.particle{
position:absolute;
font-size:14px;
opacity:.5;
animation:rise 8s linear infinite;
}
@keyframes rise{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* FINAL */
.final{
position:absolute;
width:100%;height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#000;
opacity:0;
pointer-events:none;
transition:1s;
}
.final.show{
opacity:1;
pointer-events:auto;
}

.finalText{
font-size:30px;
text-align:center;
background:linear-gradient(#fff,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SCRATCH */
.scratchBox{
margin-top:25px;
position:relative;
width:260px;
height:80px;
border-radius:20px;
overflow:hidden;
border:2px dashed gold;
}

#canvas{
position:absolute;
width:100%;
height:100%;
background:#9e9e9e;
border-radius:20px;
}

.hiddenMsg{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
opacity:0;
transform:scale(.8);
transition:.5s;
}
.hiddenMsg.show{
opacity:1;
transform:scale(1);
}

.sign{
position:absolute;
bottom:10px;
right:15px;
font-size:12px;
opacity:.5;
}
</style>
</head>

<body>

<div class="phone">

<div class="screen" id="s1">
<h2 class="glow">Ready for something different? 😏</h2>
<button class="btn" onclick="next()">Start ⚡</button>
</div>

<div class="screen final" id="final">
<div class="moon"></div>

<h1 class="finalText">
Eid Mubarak 🌙✨<br>Stay rare 😎
</h1>

<div class="scratchBox">
<div class="hiddenMsg" id="msg">👀 hidden...</div>
<canvas id="canvas"></canvas>
</div>

<div class="visualizer" id="bars"></div>

<div class="sign">— InHuman ⚡</div>
</div>

</div>

<audio id="music" loop>
<source src="https://raw.githubusercontent.com/nafis1630/Eid-Gift-By-Nafis-Fuad-/main/Islamicsound.mp3">
</audio>

<script>

/* SCREEN */
function next(){
document.getElementById("s1").style.transform="translateY(-100%)";
setTimeout(()=>{
document.getElementById("final").classList.add("show");
startMusic();
createParticles();
initScratch();
initVisualizer();
confetti({particleCount:150,spread:120});
},500);
}

/* MUSIC + AUDIO REACTIVE */
let analyser,dataArray;

function startMusic(){
let audio=document.getElementById("music");
let ctx=new (window.AudioContext||window.webkitAudioContext)();

let src=ctx.createMediaElementSource(audio);
analyser=ctx.createAnalyser();

src.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize=64;
dataArray=new Uint8Array(analyser.frequencyBinCount);

audio.volume=0.6;
audio.play();
}

/* VISUALIZER */
function initVisualizer(){
let container=document.getElementById("bars");

/* create bars */
for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="bar";
container.appendChild(b);
}

let bars=document.querySelectorAll(".bar");

function animate(){
requestAnimationFrame(animate);
analyser.getByteFrequencyData(dataArray);

bars.forEach((bar,i)=>{
let val=dataArray[i];
bar.style.height=(val/2)+"px";
});
}
animate();
}

/* PARTICLES */
function createParticles(){
for(let i=0;i<25;i++){
let p=document.createElement("div");
p.className="particle";
p.innerHTML=Math.random()>0.5?"🌙":"✨";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(p);
}
}

/* SCRATCH */
function initScratch(){
let c=document.getElementById("canvas");
let ctx=c.getContext("2d");

c.width=c.offsetWidth;
c.height=c.offsetHeight;

ctx.fillStyle="#9e9e9e";
ctx.fillRect(0,0,c.width,c.height);

ctx.fillStyle="#000";
ctx.textAlign="center";
ctx.fillText("Scratch 😏",c.width/2,45);

let drawing=false,done=false;

function scratch(x,y){
ctx.globalCompositeOperation="destination-out";
ctx.beginPath();
ctx.arc(x,y,18,0,Math.PI*2);
ctx.fill();

if(!done){
done=true;
let msg=document.getElementById("msg");
msg.innerHTML="💸 Respect unlocked 😎🔥";
msg.classList.add("show");
confetti({particleCount:80,spread:100});
}
}

c.addEventListener("mousedown",()=>drawing=true);
c.addEventListener("mouseup",()=>drawing=false);
c.addEventListener("mousemove",(e)=>{
if(!drawing)return;
scratch(e.offsetX,e.offsetY);
});

c.addEventListener("touchstart",(e)=>{
drawing=true;
let r=c.getBoundingClientRect();
scratch(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);
});

c.addEventListener("touchmove",(e)=>{
if(!drawing)return;
e.preventDefault();
let r=c.getBoundingClientRect();
scratch(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);
},{passive:false});

c.addEventListener("touchend",()=>drawing=false);
}

</script>

</body>
</html>
