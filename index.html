<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Cinematic ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
background:#000;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.logo{
font-size:30px;
letter-spacing:4px;
color:#FFD700;
animation:introAnim 3s ease forwards;
}

@keyframes introAnim{
0%{opacity:0;transform:scale(1.3);filter:blur(10px)}
60%{opacity:1}
100%{letter-spacing:2px}
}

#intro.hide{
animation:fadeOut 1.2s forwards;
}
@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* FLASH */
.flash{
position:fixed;
width:100%;
height:100%;
background:#FFD700;
opacity:0;
pointer-events:none;
z-index:998;
}

/* PHONE */
.phone{
width:100%;
max-width:360px;
height:100vh;
max-height:720px;
border-radius:30px;
overflow:hidden;
position:relative;
background: radial-gradient(circle at top, #111, #000);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:25px;
transition:transform 1.2s ease;
}

.zoom{transform:scale(1.2);}

/* TEXT */
.title{
font-size:26px;
background:linear-gradient(#fff,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* LINES */
.line{
margin-top:12px;
font-size:15px;
opacity:0;
animation:fadeUp 1s forwards;
}

.l1{animation-delay:.6s}
.l2{animation-delay:1.2s}
.l3{animation-delay:1.8s}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

/* SCENE SWITCH */
.fadeOut{
animation:fadeOutScene .6s forwards;
}
.fadeIn{
animation:fadeInScene .8s forwards;
}

@keyframes fadeOutScene{
to{opacity:0;transform:translateY(-10px)}
}

@keyframes fadeInScene{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* SHAKE */
.shake{animation:shake .4s;}
@keyframes shake{
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
}

/* BUTTON */
.btn{
margin-top:30px;
padding:14px 30px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#FFD700,#caa400);
color:black;
cursor:pointer;
}

/* SIGN */
.sign{
position:absolute;
bottom:10px;
right:15px;
font-size:12px;
opacity:.4;
}

</style>
</head>

<body>

<div id="intro">
<div class="logo">A Quiet Eid 🌙</div>
</div>

<div class="flash" id="flash"></div>

<div class="phone" id="phone">

<div id="content" style="display:none">

<!-- SCENE 1 -->
<div id="scene1">

<div class="title" id="title">Eid Mubarak 🌙</div>

<div class="line l1">Not everything needs to be loud</div>
<div class="line l2">Some feelings stay quiet…</div>
<div class="line l3">But still mean everything ✨</div>

</div>

<!-- SCENE 2 -->
<div id="scene2" style="display:none">

<div class="title">Some distances remain…</div>

<div class="line l1">Some people stay in prayers 🤍</div>
<div class="line l2">Not beside you… but still close</div>
<div class="line l3">Eid feels softer this way 🌙</div>

</div>

<button class="btn" onclick="play()">Tap to feel 🎧</button>

</div>

<div class="sign">— crafted by InHuman ⚡</div>

</div>

<audio id="music" src="./Eid2.mp3" preload="auto"></audio>

<script>

/* INTRO */
setTimeout(()=>{
document.getElementById("intro").classList.add("hide");
document.getElementById("content").style.display="block";
},3000);

/* PLAY */
function play(){

const audio = document.getElementById("music");
const flash = document.getElementById("flash");
const phone = document.getElementById("phone");
const title = document.getElementById("title");

/* FLASH */
if(flash){
flash.style.opacity = 1;
setTimeout(()=>flash.style.opacity = 0, 300);
}

/* ZOOM */
if(phone){
phone.classList.add("zoom");
}

/* SHAKE */
if(title){
title.classList.add("shake");
setTimeout(()=>title.classList.remove("shake"),400);
}

/* AUDIO (ULTRA SAFE) */
audio.pause();
audio.currentTime = 0;

audio.play().catch(()=>{
let clone = audio.cloneNode(true);
clone.play();
});

/* SCENE SWITCH */
const s1 = document.getElementById("scene1");
const s2 = document.getElementById("scene2");

if(s1 && s2){
s1.classList.add("fadeOut");

setTimeout(()=>{
s1.style.display="none";
s2.style.display="block";
s2.classList.add("fadeIn");
},600);
}

}

</script>

</body>
</html>
