<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Cinematic ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Hind Siliguri',sans-serif;}

body{
background:#000;
color:white;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.logo{
font-size:32px;
letter-spacing:6px;
color:#FFD700;
animation:introAnim 3s ease forwards;
}

@keyframes introAnim{
0%{opacity:0;transform:scale(1.4);filter:blur(10px)}
60%{opacity:1}
100%{letter-spacing:4px}
}

#intro.hide{
animation:fadeOut 1.2s forwards;
}
@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* FLASH EFFECT */
.flash{
position:fixed;
width:100%;
height:100%;
background:#FFD700;
opacity:0;
pointer-events:none;
z-index:998;
}

/* PHONE */
.phone{
width:100%;
max-width:360px;
height:100vh;
max-height:720px;
border-radius:30px;
overflow:hidden;
position:relative;
background: radial-gradient(circle at top, #111, #000);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:25px;
transition:transform 1.2s ease;
}

.zoom{
transform:scale(1.2);
}

/* TEXT */
.title{
font-size:26px;
background:linear-gradient(#fff,#FFD700);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SHAKE */
.shake{
animation:shake 0.4s;
}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

/* BUTTON */
.btn{
margin-top:30px;
padding:14px 30px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#FFD700,#caa400);
color:black;
cursor:pointer;
}

/* SIGN */
.sign{
position:absolute;
bottom:10px;
right:15px;
font-size:12px;
opacity:.4;
}

.line{
margin-top:12px;
font-size:15px;
opacity:0;
animation:fadeUp 1s forwards;
}

.line:nth-child(2){animation-delay:.6s}
.line:nth-child(3){animation-delay:1.2s}
.line:nth-child(4){animation-delay:1.8s}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
};

</style>
</head>

<body>

<div id="intro">
<div class="logo">A Quiet Eid 🌙</div>
</div>

<div class="flash" id="flash"></div>

<div class="phone" id="phone">

<div id="content" style="display:none">

<div class="title" id="title">Eid Mubarak 🌙</div>
<div class="line">Not everything needs to be loud</div>
<div class="line">Some feelings stay quiet…</div>
<div class="line">But still mean everything ✨</div>


<button class="btn" onclick="play()">Tap to feel 🎧</button>

</div>

<div class="sign">— crafted by InHuman ⚡</div>

</div>

<audio id="music" preload="auto">
<source src="./eid.mp3" type="audio/mpeg">
</audio>

<script>

/* INTRO */
setTimeout(()=>{
intro.classList.add("hide");
content.style.display="block";
},3000);

/* PLAY FUNCTION */
function play(){

let audio=document.getElementById("music");

/* ===== FLASH ===== */
let flash=document.getElementById("flash");
flash.style.opacity=1;
setTimeout(()=>flash.style.opacity=0,300);

/* ===== ZOOM ===== */
document.getElementById("phone").classList.add("zoom");

/* ===== SHAKE ===== */
let title=document.getElementById("title");
title.classList.add("shake");
setTimeout(()=>title.classList.remove("shake"),400);

/* ===== AUDIO FIX ===== */
audio.currentTime = 0;

let playPromise = audio.play();

if(playPromise !== undefined){
playPromise.catch(err=>{
console.log("Autoplay blocked:",err);
});
}

}

</script>

</body>
</html>
